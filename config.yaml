# Конфигурация проекта (несекретная). Секрет вебхука — в .env.
# Метамодель подтверждена дискавери (PRD §2.6).

entity:
  workday_type_id: 1208           # «Рабочий день»
  timelog_type_id: 1218           # «Учёт рабочего времени»
  timelog_category_id: 63         # воронка «Работы/задачи по договорам» (НЕ «Отгулы» 65)

fields:
  workday_date: ufCrm46_1742342657      # дата рабочего дня
  workday_works: ufCrm46_1742997115     # массив ID учётов («Работы/задачи за день»)
  workday_employee: ufCrm46_1742341577  # Сотрудник
  workday_day_type: ufCrm46_1742341877  # «Тип дня» (iblock_element, числовой ID справочника iblock 27)
  log_parent: parentId1208              # ссылка учёта на день
  log_contract: ufCrm48_1742996936      # Договор/ТКП/Шаблонные задачи
  log_contract_tech: ufCrm48_1754894889 # [тех] строковый ID договора, парный к коду договора
  log_description: ufCrm48_1744239302   # Описание задачи
  log_hours: ufCrm48_1742996959         # Количество часов
  log_result: ufCrm48_1743029170        # Итог (кандидат на «Информация о проделанной работе»)

# Значение поля «Договор» для «Общие задачи подразделения» (наблюдаемое в реальных записях)
contract_general_tasks: "T512_2"

# Провайдер CRM-дела (To-Do) «Заполнить работы по договорам» на карточке «Рабочего дня».
# Завершение этого дела (crm.activity.update COMPLETED=Y) = нажатие кнопки «Выполнено» (FR-2.1.7).
activity_provider_id: "CRM_TODO"

edit_window_days: 4               # FR-2.1.3 (календарные дни, включительно)

# Отбор кандидатов на заполнение (fill): whitelist «Типа дня» (числовые ID справочника iblock 27).
# Заполняем учёты ТОЛЬКО для рабочих дней; отпуск/отгул/работа-в-выходной/удалёнка — пропускаем.
# Значения справочника: 351 «Рабочий день», 352 «Отпуск», 355 «Отгул (весь день)»,
# 356 «Работа в выходной/праздник», 357 «Удалённая работа». Фильтруем по ЧИСЛОВОМУ ID
# (денормализованная строковая копия ufCrm46_1745493416 — только для аудита, не для фильтра).
workday:
  day_type_work_ids: [351]        # строго «Рабочий день» (решение заказчика)

defaults:                         # §6: дефолт + подтверждение
  task_description: "Общие задачи подразделения"
  hours: 8
  contract_tech_id: "2"           # [тех] строковый ID договора, парный к коду T512_2 (поле ufCrm48_1754894889)

export:
  output_dir: ./out
  filename_pattern: "workday_{date_from}_{date_to}.xlsx"

runtime:
  interaction: true               # true = спрашивать подтверждение; false = автозапуск
  journal_ttl_days: 7             # TTL журнала обработанных дней (.runtime/processed.json), дни
